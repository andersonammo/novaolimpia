<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>SaaSERP - Gestão de Garantias (Multi-Banco)</title>
    <style>
        :root { --orange: #f28b30; --light-orange: #fce4d0; --border: #d1d1d1; }
        
        html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; background: #f4f4f4; }
        body { font-family: 'Segoe UI', Arial, sans-serif; display: flex; flex-direction: column; }

        .window { flex: 1; display: flex; flex-direction: column; background: white; margin: 10px; border: 2px solid var(--orange); border-radius: 4px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .win-header { background: var(--orange); color: white; padding: 12px 15px; font-weight: bold; display: flex; justify-content: space-between; font-size: 15px; }
        .content { flex: 1; padding: 30px; overflow-y: auto; }
        
        .row { display: flex; gap: 20px; margin-bottom: 20px; align-items: flex-end; }
        .field { display: flex; flex-direction: column; flex: 1; }
        
        label { margin-bottom: 5px; font-size: 13px; font-weight: bold; color: #555; }
        input { padding: 12px; border: 1px solid var(--border); border-radius: 4px; outline: none; font-size: 14px; }
        input:focus { border-color: var(--orange); box-shadow: 0 0 5px rgba(242, 139, 48, 0.3); }
        input[readonly] { background-color: #e9ecef; color: #666; cursor: not-allowed; }

        /* Status e Alertas */
        .status-box { display: none; padding: 20px; border-radius: 5px; margin-top: 30px; text-align: center; font-size: 16px; font-weight: bold; }
        .status-pendente { background: #fff3e0; border: 2px solid #4caf50; color: #2e7d32; }
        .status-entregue { background: #e0f7fa; border: 2px solid #00acc1; color: #00838f; }

        /* Rodapé de Ações */
        .footer-navbar { background: #333; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #000; }
        .action-group { display: flex; gap: 15px; }
        
        .nav-item { padding: 12px 20px; color: white; cursor: pointer; font-size: 13px; background: #444; border: 1px solid #555; border-radius: 4px; font-weight: bold; transition: 0.2s; }
        .nav-item:hover { background: var(--orange); }
        .nav-item.back-btn { background: #555; } /* Estilo extra para diferenciar um pouco o Voltar */
        .nav-item.back-btn:hover { background: #d32f2f; border-color: #b71c1c; }

        .btn-save { background: var(--orange); color: white; border: none; padding: 12px 30px; cursor: pointer; font-weight: bold; border-radius: 4px; font-size: 14px; transition: 0.2s; }
        .btn-save:disabled { background: #666; cursor: not-allowed; }
        
        .btn-confirm { background: #4caf50; color: white; border: none; padding: 15px 30px; cursor: pointer; font-weight: bold; border-radius: 4px; font-size: 15px; width: 100%; margin-top: 15px; }
        .btn-confirm:hover { background: #388e3c; }

    </style>
</head>
<body>

<div class="window">
    <div class="win-header"><span>🛠️ SaaSERP - Módulo de Garantias & Estoque Automático</span> <span>v3.0</span></div>
    
    <div class="content">
        <form id="garantiaForm">
            <div class="row">
                <div class="field" style="flex: 1;">
                    <label>Número da O.S.:</label>
                    <input type="text" name="num_os" id="num_os" placeholder="Ex: AMMO-123456" required>
                </div>
                <div class="field" style="flex: 2;">
                    <label>Nome do Cliente:</label>
                    <input type="text" name="nome_cliente" id="nome_cliente" placeholder="Nome completo" required>
                </div>
            </div>
            
            <div class="row">
                <div class="field">
                    <label>Vendedor / Colaborador:</label>
                    <input type="text" name="vendedor" id="vendedor" placeholder="Quem atendeu" required>
                </div>
                <div class="field">
                    <label>Data da Compra:</label>
                    <input type="date" name="data_compra" id="data_compra" required>
                </div>
                <div class="field">
                    <label>Data Envio p/ Garantia:</label>
                    <input type="date" name="data_envio" id="data_envio" required>
                </div>
            </div>

            <div class="row">
                <div class="field" style="flex: 1;">
                    <label>Ref. do Produto (Código/SKU):</label>
                    <input type="text" name="referencia_produto" id="referencia_produto" placeholder="Para baixa automática no estoque" required>
                </div>
                <div class="field" style="flex: 2;">
                    <label>Observações / Motivo da Garantia:</label>
                    <input type="text" name="observacao" id="observacao" placeholder="Ex: Lente riscada, armação descascando...">
                </div>
            </div>

            <div id="boxPendente" class="status-box status-pendente">
                📦 STATUS: AGUARDANDO RETORNO DA GARANTIA
                <button type="button" class="btn-confirm" onclick="confirmarEntrega()">✔️ Confirmar Entrega ao Cliente e Baixar do Estoque</button>
            </div>

            <div id="boxEntregue" class="status-box status-entregue">
                ✅ STATUS: FINALIZADA E ENTREGUE AO CLIENTE!
                <p style="font-size: 14px; font-weight: normal; margin-top: 5px;" id="textoDataEntrega"></p>
            </div>
        </form>
    </div>

    <div class="footer-navbar">
        <div class="action-group">
            <!-- Botão Voltar adicionado aqui -->
            <div class="nav-item back-btn" onclick="window.location.href='./index.html'">⬅️ Voltar</div>
            <div class="nav-item" onclick="novoRegistro()">📄 Nova Garantia</div>
            <div class="nav-item" onclick="localizarGarantia()">🔍 Localizar Garantia</div>
        </div>
        <div>
            <button type="submit" form="garantiaForm" class="btn-save" id="btnSalvar">💾 Gravar no Banco de Garantias</button>
        </div>
    </div>
</div>

<script>
    // =====================================================================
    // CONFIGURAÇÃO DOS DOIS BANCOS DE DADOS
    // =====================================================================
    
    // 1. Banco Fiscal (Onde está o Estoque e Produtos)
    const URL_BANCO_FISCAL = "https://script.google.com/macros/s/AKfycbxl_T0iTsrmHCeuLp6tcSMT9BxSaWEcd_nXAvZVgFsfsN1ioQVgKNS_SRFwqdCRqyUA/exec";
    
    // 2. Banco de Colaboradores (Onde estão as Garantias e RH)
    // COLOQUE O LINK DO SCRIPT DE RH/COLABORADORES AQUI:
    const URL_BANCO_COLABORADORES = "https://script.google.com/macros/s/AKfycbwnXSMwAgrSJrwxKLnAK9SV9a5JwSVNFjZ4rYglqdEReGy9uM5sn9Jr8yb6FxwTxQ3KjA/exec"; 

    // =====================================================================

    function novoRegistro() {
        document.getElementById('garantiaForm').reset();
        document.querySelectorAll('.status-box').forEach(b => b.style.display = 'none');
        document.getElementById('btnSalvar').style.display = 'block';
        document.querySelectorAll('input').forEach(i => i.readOnly = false);
    }

    // Salvar no Banco de Garantias
    document.getElementById('garantiaForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const btn = document.getElementById('btnSalvar');
        btn.textContent = "⏳ Gravando..."; btn.disabled = true;

        const fd = new FormData(this);
        const dados = Object.fromEntries(fd.entries());

        fetch(URL_BANCO_COLABORADORES, {
            method: "POST",
            body: JSON.stringify({ acao: "salvar_garantia", dados: dados })
        })
        .then(res => res.json())
        .then(res => {
            alert(res.mensagem);
            if(res.sucesso) novoRegistro();
            btn.textContent = "💾 Gravar no Banco de Garantias"; btn.disabled = false;
        })
        .catch(err => {
            alert("Erro de conexão com o banco de colaboradores.");
            btn.disabled = false;
        });
    });

    // Localizar no Banco de Garantias
    function localizarGarantia() {
        let termo = prompt("Número da O.S. ou Nome do Cliente:");
        if (!termo) return;

        fetch(URL_BANCO_COLABORADORES, {
            method: "POST",
            body: JSON.stringify({ acao: "localizar_garantia", termo: termo })
        })
        .then(res => res.json())
        .then(res => {
            if(res.sucesso) {
                document.getElementById('num_os').value = res.dados.os;
                document.getElementById('nome_cliente').value = res.dados.cliente;
                document.getElementById('vendedor').value = res.dados.vendedor;
                document.getElementById('referencia_produto').value = res.dados.referencia || "";
                document.getElementById('observacao').value = res.dados.observacao || "";
                
                if(res.dados.compra) document.getElementById('data_compra').value = res.dados.compra.substring(0, 10);
                if(res.dados.envio) document.getElementById('data_envio').value = res.dados.envio.substring(0, 10);

                document.querySelectorAll('input').forEach(i => i.readOnly = true);
                document.getElementById('btnSalvar').style.display = 'none';

                if(res.dados.status === "ENTREGUE AO CLIENTE" || res.dados.entrega) {
                    document.getElementById('boxPendente').style.display = 'none';
                    document.getElementById('boxEntregue').style.display = 'block';
                    document.getElementById('textoDataEntrega').innerText = "Data: " + res.dados.entrega.substring(0, 10);
                } else {
                    document.getElementById('boxEntregue').style.display = 'none';
                    document.getElementById('boxPendente').style.display = 'block';
                }
            } else { alert(res.mensagem); }
        });
    }

    // Confirmar Entrega e Baixar Estoque
    function confirmarEntrega() {
        const os = document.getElementById('num_os').value;
        if(!confirm("Isso confirmará a entrega ao cliente e descontará 1 unidade da referência " + document.getElementById('referencia_produto').value + " no seu banco fiscal. Confirma?")) return;

        fetch(URL_BANCO_COLABORADORES, {
            method: "POST",
            body: JSON.stringify({ acao: "confirmar_entrega_garantia", os: os })
        })
        .then(res => res.json())
        .then(res => {
            alert(res.mensagem);
            if(res.sucesso) novoRegistro();
        })
        .catch(err => alert("Erro ao processar baixa."));
    }
</script>
</body>
</html>
