<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Óticas Ammo - Menu Principal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; user-select: none; }
        body, html { width: 100vw; height: 100vh; overflow: hidden; background-color: #000; }

        .bg-image { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; object-position: top center; z-index: 1; content: url('https://i.postimg.cc/XYnjqbgF/Untitled-design-(3).png'); }

        .top-left-panel { position: absolute; top: 40px; left: 40px; z-index: 10; display: flex; flex-direction: column; align-items: flex-start; gap: 15px; }
        .logo-text { font-size: 28px; font-weight: 800; color: #0A2342; background: rgba(255, 255, 255, 0.8); padding: 5px 15px; border-radius: 8px; letter-spacing: 1px; display: flex; align-items: center; gap: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .logo-text i { color: #007aff; }
        .qr-code-placeholder { width: 80px; height: 80px; background: white; padding: 5px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .qr-code-placeholder img { width: 100%; height: 100%; object-fit: cover; }
        .btn-conheca { background: #111; color: #fff; padding: 10px 20px; border-radius: 8px; font-size: 14px; font-weight: bold; display: flex; align-items: center; gap: 10px; border: 1px solid rgba(255,255,255,0.2); cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }

        .brands-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255, 255, 255, 0.3); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); z-index: 20; display: none; flex-direction: column; align-items: center; justify-content: center; padding-bottom: 80px; }
        .btn-fechar-overlay { position: absolute; top: 40px; right: 40px; font-size: 35px; color: #0A2342; cursor: pointer; transition: 0.3s; background: rgba(255,255,255,0.5); width: 50px; height: 50px; border-radius: 50%; display: flex; justify-content: center; align-items: center; }
        .btn-fechar-overlay:hover { background: #fff; color: #dc3545; }
        .overlay-title { font-size: 20px; font-weight: bold; color: #fff; margin-bottom: 25px; text-shadow: 0 2px 5px rgba(0,0,0,0.4); letter-spacing: 1px; }

        .brands-grid { display: flex; justify-content: center; flex-wrap: wrap; gap: 20px; margin-bottom: 30px; max-width: 900px; }
        .brand-card { width: 160px; background: #fff; border-radius: 8px; height: 80px; display: flex; flex-direction: column; align-items: center; justify-content: center; text-decoration: none; box-shadow: 0 5px 15px rgba(0,0,0,0.1); border: 1px solid #eee; transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s; cursor: pointer; padding: 5px; }
        .brand-card:hover { transform: scale(1.05); box-shadow: 0 8px 20px rgba(0,0,0,0.2); border-color: #007aff; }
        .brand-logo { margin-bottom: 5px; text-align: center; }
        .brand-date { font-size: 9px; color: #888; font-weight: 600; text-align: center; }

        .logo-ammo { font-size: 13px; font-weight: 600; color: #555; }
        .logo-hoya { font-size: 24px; font-weight: 900; color: #0055A5; }
        .logo-zeiss { font-size: 26px; font-weight: 900; color: #003882; border: 2px solid #003882; padding: 0 4px; border-radius: 2px; }
        .logo-varilux { font-size: 22px; font-weight: bold; color: #000; font-family: "Times New Roman", Times, serif; }

        .bg-ammo { background-color: #FFC107 !important; border-color: #e0a800 !important; }
        .bg-ammo .logo-ammo { color: #d90000 !important; font-weight: 900 !important; font-size: 14px; } 
        .bg-ammo .brand-date { color: #b30000 !important; font-weight: 800 !important; }

        .bg-zeiss { background-color: #003882 !important; border-color: #002255 !important; }
        .bg-zeiss .logo-zeiss { color: #fff !important; border-color: #fff !important; }
        .bg-zeiss .brand-date { color: #cce0ff !important; }

        .lens-types-row { display: flex; gap: 20px; }
        .lens-type-btn { background: rgba(255, 255, 255, 0.4); border: 2px solid rgba(255, 255, 255, 0.8); border-radius: 15px; width: 110px; height: 90px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s; color: #333; }
        .lens-type-btn.active, .lens-type-btn:hover { background: rgba(255, 255, 255, 0.9); border-color: #007aff; color: #007aff; box-shadow: 0 5px 15px rgba(0,0,0,0.15); }
        .lens-icon-svg { width: 45px; height: 35px; fill: none; stroke: currentColor; stroke-width: 3.5; margin-bottom: 8px; }
        .lens-type-text { font-size: 9px; font-weight: 800; text-transform: uppercase; }

        .bottom-menu-bar { position: absolute; bottom: 0; left: 0; width: 100%; height: 120px; background: linear-gradient(to top, rgba(255,255,255,0.95) 0%, rgba(255,255,255,0.7) 70%, transparent 100%); z-index: 30; display: flex; align-items: flex-end; padding-bottom: 12px; }
        .menu-scroll-container { width: 100%; display: flex; gap: 15px; padding: 0 20px; justify-content: center; }
        .menu-card { flex: 1; max-width: 160px; height: 95px; background: rgba(255, 255, 255, 0.95); border: 1px solid #ccc; border-radius: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; text-decoration: none; color: #444; position: relative; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.05); transition: transform 0.2s, background 0.2s, box-shadow 0.2s; cursor: pointer; padding: 8px; }
        .menu-card:hover { transform: translateY(-5px); background: #fff; border-color: #007aff; color: #007aff; box-shadow: 0 8px 15px rgba(0,0,0,0.1); }
        .card-title { font-size: 10px; font-weight: 800; text-align: center; text-transform: uppercase; line-height: 1.2; margin-bottom: 8px; min-height: 24px; }
        .card-icon { font-size: 32px; color: #555; transition: color 0.2s; }
        .menu-card:hover .card-icon { color: #007aff; }
        .menu-card:hover .icon-game { color: #ff9500 !important; }
    </style>
</head>
<body>

    <img class="bg-image" alt="Background">

    <div class="top-left-panel">
        <div class="logo-text"><i class="fas fa-eye"></i> AMMO AI</div>
        <div class="qr-code-placeholder"><img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=AmmoOticas" alt="QR Code"></div>
        <div class="btn-conheca"><i class="fas fa-eye text-primary"></i> Conheça a AMMO AI</div>
    </div>

    <div class="brands-overlay" id="overlay-marcas">
        <div class="btn-fechar-overlay" onclick="fecharMarcas()"><i class="fas fa-times"></i></div>
        <div class="overlay-title" id="titulo-tabela">Escolha uma tabela visão multifocal</div>

        <div class="brands-grid" id="brands-grid">
            <a href="githb.html?marca=ammo" class="brand-card bg-ammo">
                <div class="brand-logo logo-ammo">ÓTICAS AMMO</div>
                <div class="brand-date">AMMO 5 2026</div>
            </a>
            <a href="githb.html?marca=hoya" class="brand-card">
                <div class="brand-logo logo-hoya">HOYA</div>
                <div class="brand-date">Hoya 12 2025</div>
            </a>
            <a href="githb.html?marca=varilux" class="brand-card">
                <div class="brand-logo logo-varilux">Varilux.</div>
                <div class="brand-date">Essilor 04 2026</div>
            </a>
        </div>

        <div class="lens-types-row">
            <div class="lens-type-btn active" onclick="selecionarTipo(this, 'visão multifocal')">
                <svg class="lens-icon-svg" viewBox="0 0 100 60"><path d="M10,30 Q30,0 50,0 T90,30 Q70,60 50,60 T10,30 Z"/><path d="M40,15 Q50,30 35,45" stroke-width="2"/><path d="M60,15 Q50,30 65,45" stroke-width="2"/></svg>
                <div class="lens-type-text">Multifocais</div>
            </div>
            <div class="lens-type-btn" onclick="selecionarTipo(this, 'visão simples')">
                <svg class="lens-icon-svg" viewBox="0 0 100 60"><path d="M10,30 Q30,0 50,0 T90,30 Q70,60 50,60 T10,30 Z"/><circle cx="50" cy="30" r="12" stroke-width="2.5"/></svg>
                <div class="lens-type-text">Visão Simples</div>
            </div>
            <div class="lens-type-btn" onclick="selecionarTipo(this, 'ocupacional')">
                <svg class="lens-icon-svg" viewBox="0 0 100 60"><path d="M10,30 Q30,0 50,0 T90,30 Q70,60 50,60 T10,30 Z"/><rect x="30" y="20" width="40" height="20" rx="8" stroke-width="2"/></svg>
                <div class="lens-type-text">Ocupacionais</div>
            </div>
            <div class="lens-type-btn" onclick="selecionarTipo(this, 'bifocal')">
                <svg class="lens-icon-svg" viewBox="0 0 100 60"><path d="M10,30 Q30,0 50,0 T90,30 Q70,60 50,60 T10,30 Z"/><path d="M35,40 A 15 15 0 0 0 65 40 Z" stroke-width="2.5"/></svg>
                <div class="lens-type-text">Bifocais</div>
            </div>
        </div>
    </div>

    <div class="bottom-menu-bar">
        <div class="menu-scroll-container">
            <a href="#" class="menu-card" onclick="alert('Módulo de Tabela Dinâmica em desenvolvimento.');"><span class="card-title">TABELA<br>DINÂMICA</span><i class="fas fa-table card-icon"></i></a>
            <a href="#" class="menu-card" onclick="abrirMarcas(); event.preventDefault();"><span class="card-title" style="color: #007aff;">SIMULADOR<br>LENTES AR</span><i class="fas fa-glasses card-icon" style="color: #007aff;"></i></a>
            <a href="#" class="menu-card"><span class="card-title">TESTE DE<br>VISÃO</span><i class="fas fa-eye card-icon"></i></a>
            <a href="#" class="menu-card" onclick="alert('Módulo Game em desenvolvimento.');"><span class="card-title">ESPAÇO<br>GAME</span><i class="fas fa-gamepad card-icon icon-game" style="color: #ff9500;"></i></a>
            <a href="#" class="menu-card"><span class="card-title">DASHBOARD<br>DE ATEND.</span><i class="fas fa-chart-line card-icon"></i></a>
            <a href="#" class="menu-card"><span class="card-title">EDITOR DE<br>TABELAS</span><i class="fas fa-cogs card-icon"></i></a>
            <a href="buscaos.html" class="menu-card"><span class="card-title" style="color: #007aff;">CAIXA E<br>O.S.</span><i class="fas fa-file-invoice-dollar card-icon" style="color: #007aff;"></i></a>
        </div>
    </div>

    <script>
        const gridsHtml = {
            'visão multifocal': `
                <a href="./multi.html" class="brand-card bg-ammo">
                    <div class="brand-logo logo-ammo">ÓTICAS AMMO</div>
                    <div class="brand-date">OTICAS AMMO 05 2026</div>
                </a>
                <div class="brand-card" onclick="alert('Tabela Hoya em desenvolvimento.');">
                    <div class="brand-logo logo-hoya">HOYA</div>
                    <div class="brand-date">Hoya 12 2025</div>
                </div>
                <div class="brand-card" onclick="alert('Tabela Varilux em desenvolvimento.');">
                    <div class="brand-logo logo-varilux">Varilux.</div>
                    <div class="brand-date">Essilor 04 2026</div>
                </div>
            `,
            'visão simples': `
                <!-- LINK ATUALIZADO AQUI: Lente Digital (SURF) -->
                <a href="./vs.html" class="brand-card bg-ammo">
                    <div class="brand-logo logo-ammo">ÓTICAS AMMO</div>
                    <div class="brand-date">OTICAS AMMO SURF 05 2026</div>
                </a>
                <!-- LINK ATUALIZADO AQUI: Lente Pronta (LP) -->
                <a href="./vs.html" class="brand-card bg-ammo">
                    <div class="brand-logo logo-ammo">ÓTICAS AMMO</div>
                    <div class="brand-date">OTICAS AMMO LP 05 2026</div>
                </a>
                <div class="brand-card" onclick="alert('Tabela Hoya em desenvolvimento.');">
                    <div class="brand-logo logo-hoya">HOYA</div>
                    <div class="brand-date">Hoya 12 2025</div>
                </div>
                <div class="brand-card bg-zeiss" onclick="alert('Tabela Zeiss em desenvolvimento.');">
                    <div class="brand-logo logo-zeiss">ZEISS</div>
                    <div class="brand-date">Zeiss 04 2026</div>
                </div>
                <div class="brand-card" onclick="alert('Tabela Varilux em desenvolvimento.');">
                    <div class="brand-logo logo-varilux">Varilux.</div>
                    <div class="brand-date">Essilor 04 2026</div>
                </div>
            `,    'ocupacional': `
                <a href="githb.html?marca=ammo" class="brand-card bg-ammo">
                    <div class="brand-logo logo-ammo">ÓTICAS AMMO</div>
                    <div class="brand-date">OTICAS AMMO OCUP 11 2025</div>
                </a>
                <a href="githb.html?marca=hoya" class="brand-card">
                    <div class="brand-logo logo-hoya">HOYA</div>
                    <div class="brand-date">Hoya 12 2025</div>
                </a>
                <a href="githb.html?marca=zeiss" class="brand-card bg-zeiss">
                    <div class="brand-logo logo-zeiss">ZEISS</div>
                    <div class="brand-date">Zeiss 04 2026</div>
                </a>
                <a href="githb.html?marca=varilux" class="brand-card">
                    <div class="brand-logo logo-varilux">Varilux.</div>
                    <div class="brand-date">Essilor 04 2026</div>
                </a>
            `,
            'bifocal': `
                <a href="githb.html?marca=ammo" class="brand-card bg-ammo">
                    <div class="brand-logo logo-ammo">ÓTICAS AMMO</div>
                    <div class="brand-date">OTICAS AMMO BIFO 11 2025</div>
                </a>
            `
        };

        function abrirMarcas() { document.getElementById('overlay-marcas').style.display = 'flex'; }
        function fecharMarcas() { document.getElementById('overlay-marcas').style.display = 'none'; }

        function selecionarTipo(elemento, tipoTexto) {
            const botoes = document.querySelectorAll('.lens-type-btn');
            botoes.forEach(btn => btn.classList.remove('active'));
            elemento.classList.add('active');
            document.getElementById('titulo-tabela').innerText = 'Escolha uma tabela ' + tipoTexto;
            document.getElementById('brands-grid').innerHTML = gridsHtml[tipoTexto] || gridsHtml['visão multifocal'];
        }
    </script>
</body>
</html>
