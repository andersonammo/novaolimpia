<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Óticas Ammo - Simulador Profissional</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            /* Menu transparente */
            --bg-menu-dark: rgba(0, 0, 0, 0.15); 
            --accent-blue: #0033a0; 
            --white-bar: #ffffff; 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; user-select: none; }
        body { background-color: #050505; overflow: hidden; width: 100vw; height: 100vh; color: #fff; }

        /* LOADING */
        #loading-screen { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; transition: opacity 0.5s ease; }
        .spinner { border: 4px solid rgba(255, 255, 255, 0.1); border-left-color: var(--accent-blue); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* FUNDO ESTATICO (Efeito 3D Removido) */
        #full-bg-container { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 0; overflow: hidden; background: #111; }
        
        #img-blurred-bg, #video-blurred-bg { width: 100%; height: 100%; object-fit: cover; filter: blur(5px) brightness(1.0); }
        #video-blurred-bg { display: none; }

        /* MOTOR VISUAL (LENTE) */
        .simulator-stage { 
            position: absolute; top: 0; left: 0; right: 0; bottom: 45px; 
            display: flex; justify-content: center; align-items: center; z-index: 1; 
            overflow: hidden; 
        }
        
        /* ESCALA REDUZIDA PARA 1.10 */
        .svg-engine { width: 100%; height: 100%; transform: scale(1.10); filter: drop-shadow(0 20px 30px rgba(0,0,0,0.6)); }
        
        .lens-outline { fill: none; stroke: url(#lens-grad); stroke-width: 6; }
        
        /* LINHAS PONTILHADAS */
        .corridor-line { fill: none; stroke: #ffffff; stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; stroke-dasharray: 8, 8; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3)); }
        
        /* Sincronizando animação da linha e da máscara de recorte */
        .corridor-line, #svg-corridor-path { transition: d 0.7s cubic-bezier(0.25, 1, 0.5, 1); }

        /* PAINEL LATERAL (GLASSMORPHISM) */
        .left-panel { 
            position: absolute; top: 0; left: 0; bottom: 45px; width: 250px; 
            background: var(--bg-menu-dark); 
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border-right: 1px solid rgba(255,255,255,0.05); 
            display: flex; flex-direction: column; z-index: 10; 
        }
        
        .panel-header { padding: 15px; background: transparent; color: #fff; font-size: 13px; font-weight: 800; letter-spacing: 1px; display: flex; flex-direction: column; border-bottom: 1px solid rgba(255,255,255,0.1); text-align: center; }

        .lens-list { flex: 1; overflow-y: auto; padding: 10px; }
        .lens-list::-webkit-scrollbar { width: 4px; }
        .lens-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }
        
        .lens-item { 
            background: rgba(0, 0, 0, 0.5); 
            border-radius: 8px; 
            margin-bottom: 6px;
            cursor: pointer; overflow: hidden; transition: 0.3s; 
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        /* CABEÇALHO DA LENTE (NOME MAIOR EM CIMA, PREÇO MENOR EM BAIXO) */
        .lens-header { padding: 10px 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; }
        .lens-name { font-size: 14px; font-weight: 800; color: #fff; text-transform: uppercase; letter-spacing: 0.5px; text-align: center; }
        .lens-price { font-size: 11px; font-weight: 600; color: #bbb; text-align: center; }

        .lens-item.selected { background: rgba(240, 242, 245, 0.95); border: none; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .lens-item.selected .lens-name { color: #333; }
        .lens-item.selected .lens-price { color: var(--accent-blue); font-weight: 700; }

        .lens-options { max-height: 0; overflow: hidden; background: transparent; display: flex; flex-direction: column; transition: max-height 0.4s ease; }
        .lens-item.expanded .lens-options { max-height: 600px; padding-bottom: 10px; }
        .option-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; border-top: 1px solid rgba(0,0,0,0.05); }
        .opt-label { font-size: 10px; color: #666; font-weight: 600; }
        .opt-select { border: none; background: transparent; font-size: 10px; color: var(--accent-blue); font-weight: 800; text-align: right; outline: none; appearance: none; direction: rtl; cursor: pointer; min-width: 90px; }
        .opt-select option { background: #222; color: #fff; }

        /* UI DIREITA E TOPO */
        .top-menu { position: absolute; top: 15px; left: 270px; display: flex; background: rgba(0,0,0,0.4); backdrop-filter: blur(10px); border-radius: 8px; z-index: 10; border: 1px solid rgba(255,255,255,0.1); }
        .top-btn { padding: 8px 12px; color: #fff; font-size: 11px; border-right: 1px solid rgba(255,255,255,0.1); font-weight: 600; cursor: pointer; }
        .env-selector { background: transparent; color: #fff; border: none; outline: none; font-size: 11px; font-weight: 600; cursor: pointer; }
        .env-selector option { background: #222; color: #fff; font-weight: bold; }

        .right-menu { position: absolute; top: 50%; right: 20px; transform: translateY(-50%); display: flex; flex-direction: column; background: rgba(0,0,0,0.4); backdrop-filter: blur(10px); border-radius: 10px; z-index: 10; border: 1px solid rgba(255,255,255,0.1); }
        .right-btn { padding: 15px 12px; color: #fff; font-size: 10px; text-align: center; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .right-btn.active-green { background: #28a745; border-radius: 0 0 10px 10px; }

        /* RODAPÉ E POPUPS */
        .bottom-bar { 
            position: absolute; bottom: 0; left: 0; width: 100%; height: 45px; 
            background: var(--white-bar); border-top: 1px solid #ddd; 
            display: flex; justify-content: space-between; align-items: center; z-index: 20; 
        }
        
        .bottom-tools { display: flex; height: 100%; }
        
        .tool-btn { 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            padding: 0 20px; color: var(--accent-blue); font-size: 10px; font-weight: 600; 
            border-right: 1px solid #eee; cursor: pointer; transition: 0.2s; gap: 2px;
        }
        .tool-btn:hover { background: #f0f4f8; }
        .tool-btn i { font-size: 18px; }

        .cart-area { display: flex; align-items: center; gap: 12px; padding-right: 25px; }
        .cart-product-name { font-size: 11px; color: var(--accent-blue); font-weight: 700; text-transform: uppercase; }
        .cart-price { font-weight: 800; color: var(--accent-blue); font-size: 15px; text-align: right; }
        
        .installment-select {
            background: #f0f4f8; border: 1px solid #ccc; color: var(--accent-blue); font-weight: 800; font-size: 14px; cursor: pointer; outline: none; border-radius: 4px; padding: 2px 6px;
        }

        .btn-lancar-os { background: var(--accent-blue); color: #fff; border: none; padding: 10px; font-size: 11px; font-weight: 800; border-radius: 6px; margin: 8px 12px; cursor: pointer; transition: 0.2s; text-transform: uppercase; }
        .btn-lancar-os:hover { background: #002277; }

        .valor-popup, .calc-popup { position: absolute; bottom: 45px; background: var(--white-bar); border: 1px solid #dee2e6; display: none; padding: 15px; box-shadow: 0 -4px 15px rgba(0,0,0,0.1); border-radius: 8px 8px 0 0; z-index: 15; }
        
        /* POPUP DE OPÇÕES DE VALORES ATUALIZADO */
        .valor-popup { left: 260px; gap: 12px; flex-direction: column; align-items: flex-start; }
        .valor-popup.show, .calc-popup.show { display: flex; }
        .vp-label { display: flex; align-items: center; gap: 8px; font-size: 12px; color: #4b6584; cursor: pointer; font-weight: 600; }
        
        .calc-popup { right: 20px; flex-direction: column; width: 220px; }
        #calc-display { width: 100%; height: 35px; text-align: right; font-size: 18px; margin-bottom: 10px; border: 1px solid #ddd; }
        .calc-keys { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; }
        .calc-keys button { height: 35px; cursor: pointer; background: #f0f0f0; border: 1px solid #ccc; border-radius: 4px; font-weight: bold;}
    </style>
</head>
<body>

    <div id="loading-screen"><div class="spinner"></div><div style="font-size: 12px; color: #888;">Sincronizando Preços Ammo...</div></div>

    <div id="full-bg-container">
        <img id="img-blurred-bg" src="https://images.unsplash.com/photo-1600880292203-757bb62b4baf?q=80&w=1600&auto=format&fit=crop">
        <video id="video-blurred-bg" autoplay playsinline muted></video>
    </div>

    <div class="simulator-stage">
        <svg class="svg-engine" viewBox="0 0 1000 660" preserveAspectRatio="xMidYMid meet">
            <defs>
                <linearGradient id="lens-grad" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#e0e0e0" />
                    <stop offset="50%" stop-color="#888888" />
                    <stop offset="100%" stop-color="#444444" />
                </linearGradient>
                <clipPath id="lens-outline-clip">
                    <path d="M120 120 C 300 60, 700 60, 880 120 C 980 270, 900 520, 750 580 C 600 620, 400 620, 250 580 C 100 520, 20 270, 120 120 Z" />
                </clipPath>
                <clipPath id="corridor-clip"><path id="svg-corridor-path" d="" /></clipPath>
            </defs>
            
            <g transform="translate(85, 0)">
                <g clip-path="url(#lens-outline-clip)">
                    <image id="img-sharp" href="https://images.unsplash.com/photo-1600880292203-757bb62b4baf?q=80&w=1600&auto=format&fit=crop" x="-85" y="0" width="1000" height="660" preserveAspectRatio="xMidYMid slice" clip-path="url(#corridor-clip)" />
                    <foreignObject id="fo-video" x="-85" y="0" width="1000" height="660" clip-path="url(#corridor-clip)" style="display: none;">
                        <video id="video-sharp" autoplay playsinline muted style="width: 100%; height: 100%; object-fit: cover;"></video>
                    </foreignObject>
                    <path id="svg-line-left" class="corridor-line" d="" />
                    <path id="svg-line-right" class="corridor-line" d="" />
                </g>
                <path d="M120 120 C 300 60, 700 60, 880 120 C 980 270, 900 520, 750 580 C 600 620, 400 620, 250 580 C 100 520, 20 270, 120 120 Z" class="lens-outline" />
            </g>
        </svg>
    </div>

    <div class="left-panel">
        <div class="panel-header">
            <span id="panel-title-text">LINHA AMMO AI</span>
        </div>
        <div class="lens-list" id="lens-container"></div>
    </div>

    <div class="top-menu">
        <div class="top-btn"><i class="fas fa-table"></i> Tabelas</div>
        <div class="top-btn"><i class="fas fa-image"></i> Ambientes: <select class="env-selector" id="env-select" onchange="changeBg(this.value)">
            <option value="0">Escritório</option>
            <option value="1">Carro</option>
            <option value="2">Olho</option>
            <option value="3">Livro</option>
            <option value="4">PC</option>
            <option value="5">Montanha</option>
        </select></div>
    </div>

    <div class="right-menu">
        <div class="right-btn"><i class="fas fa-pencil-alt"></i><br><br>Desenhar</div>
        <div class="right-btn active-green" id="btn-cam" onclick="toggleCamera()"><i class="fas fa-video"></i><br><br>Câmera</div>
    </div>

    <div class="bottom-bar">
        <div class="bottom-tools">
            <div class="tool-btn" onclick="window.location.href='index.html'">
                <i class="fas fa-list-ul"></i>
                <span>Menu</span>
            </div>
            <div class="tool-btn">
                <i class="fas fa-glasses"></i>
                <span>Extras</span>
            </div>
            <div class="tool-btn" onclick="window.open('cadastronovo.html', '_blank')">
                <i class="fas fa-file-signature"></i>
                <span>OS</span>
            </div>
            <div class="tool-btn" id="btn-valor" onclick="toggleValorPopup()">
                <i class="fas fa-cog"></i>
                <span>Opções</span>
            </div>
            <div class="tool-btn" id="btn-calc" onclick="toggleCalcPopup()">
                <i class="fas fa-calculator"></i>
                <span>Calculadora</span>
            </div>
        </div>
        
        <div class="cart-area">
            <span class="cart-product-name" id="cart-name">Selecione uma lente</span>
            
            <div style="display:flex; align-items:center; gap: 6px;">
                <select id="installment-select" class="installment-select" onchange="updateFinanceSystem()">
                    <option value="1">1x</option>
                    <option value="2">2x</option>
                    <option value="3">3x</option>
                    <option value="4">4x</option>
                    <option value="5">5x</option>
                    <option value="6">6x</option>
                    <option value="7">7x</option>
                    <option value="8">8x</option>
                    <option value="9">9x</option>
                    <option value="10">10x</option>
                    <option value="11">11x</option>
                    <option value="12" selected>12x</option>
                </select>
                <span class="cart-price" id="cart-price">R$ 0,00</span>
            </div>
            <i class="fas fa-shopping-cart fa-lg" style="color: var(--accent-blue);"></i>
        </div>
        
        <div class="valor-popup" id="valor-popup">
            <label class="vp-label"><input type="radio" name="price-mode" value="avista" onchange="updateFinanceSystem()"> Valores à Vista</label>
            <label class="vp-label"><input type="radio" name="price-mode" value="prazo" checked onchange="updateFinanceSystem()"> Valores a Prazo (Parcelado)</label>
            <label class="vp-label"><input type="radio" name="price-mode" value="oculto" onchange="updateFinanceSystem()"> Ocultar Valores</label>
        </div>

        <div class="calc-popup" id="calc-popup">
            <input type="text" id="calc-display" disabled value="0">
            <div class="calc-keys">
                <button onclick="calcInput('7')">7</button><button onclick="calcInput('8')">8</button><button onclick="calcInput('9')">9</button><button onclick="calcInput('/')">÷</button>
                <button onclick="calcInput('4')">4</button><button onclick="calcInput('5')">5</button><button onclick="calcInput('6')">6</button><button onclick="calcInput('*')">×</button>
                <button onclick="calcInput('1')">1</button><button onclick="calcInput('2')">2</button><button onclick="calcInput('3')">3</button><button onclick="calcInput('-')">-</button>
                <button onclick="calcClear()">C</button><button onclick="calcInput('0')">0</button><button onclick="calcEval()">=</button><button onclick="calcInput('+')">+</button>
            </div>
        </div>
    </div>

    <script>
        const url_api_sheets = 'https://script.google.com/macros/s/AKfycbzbtC3k2RtCPxBQYOHbHTuftEniumTHIdUTfAbWuarYO3-QGYVLuwE8-fHKPhvcPRVm/exec'; 

        let lensDatabase = {};
        let currentLensModel = "";
        let activeLensItem = null;
        
        let marcaFiltroAtiva = 'ammo';

        const lensDesignMap = { 
            'Ammo One': 'lvl1', 'Ammo Start D+': 'lvl2', 'Ammo Like': 'lvl3', 'Ammo Select': 'lvl4', 'Ammo Premium': 'lvl5', 'Ammo Maxima': 'lvl6', 'Ammo Supera': 'lvl7', 'Ammo Evo': 'lvl8',
            'Varilux Liberty': 'lvl3', 'Varilux Comfort': 'lvl4', 'Varilux Physio': 'lvl6', 'Varilux X Series': 'lvl7', 'Varilux XR Pro': 'lvl8' 
        };
        
        async function loadDataFromSheets() {
            try {
                const response = await fetch(url_api_sheets);
                lensDatabase = await response.json();
                document.getElementById('loading-screen').style.display = 'none';
                renderMenuLentes(); 
            } catch (error) { document.getElementById('loading-screen').innerHTML = "Erro ao carregar planilha."; }
        }

        function filtrarMarca(marcaId, nomeExibicao) {
            marcaFiltroAtiva = marcaId;
            
            document.querySelectorAll('.brand-btn').forEach(btn => btn.classList.remove('active'));
            try { document.getElementById(`btn-${marcaId}`).classList.add('active'); } catch(e) {}
            
            document.getElementById('panel-title-text').innerText = `LINHA ${nomeExibicao}`;
            
            if(Object.keys(lensDatabase).length > 0) {
                renderMenuLentes();
            }
        }

        function renderMenuLentes() {
            const container = document.getElementById('lens-container');
            container.innerHTML = ''; 
            
            const modelosInvertidos = Object.keys(lensDatabase).reverse(); 

            modelosInvertidos.forEach((modelName) => {
                const nomeDaLente = modelName.toLowerCase();
                
                if (nomeDaLente.includes('vs ') || nomeDaLente.includes('visão simples') || nomeDaLente.includes('visao simples')) {
                    return; 
                }

                if (!nomeDaLente.includes(marcaFiltroAtiva)) {
                    return; 
                }

                const tratamentos = lensDatabase[modelName].tratamentos;
                const firstTreatment = Object.keys(tratamentos)[0];
                const firstMaterial = Object.keys(tratamentos[firstTreatment])[0];
                const basePrice = tratamentos[firstTreatment][firstMaterial];
                
                const design = lensDesignMap[modelName] || 'lvl4'; 
                
                const div = document.createElement('div');
                div.className = 'lens-item';
                div.setAttribute('data-baseprice', basePrice); 
                div.innerHTML = `
                    <div class="lens-header" onclick="handleLensClick(this.parentElement, '${design}', '${modelName}')">
                        <div class="lens-name">${modelName}</div>
                        <div class="lens-price"></div>
                    </div>
                    <div class="lens-options" onclick="event.stopPropagation()">
                        <div class="option-row"><span class="opt-label">Superfície:</span><select class="opt-select js-opt-surface" onchange="calculateCart()"><option value="0" data-name="Digital">Digital</option><option value="2400" data-name="Freeform">Freeform</option></select></div>
                        <div class="option-row"><span class="opt-label">Material:</span><select class="opt-select js-opt-material" onchange="calculateCart()"></select></div>
                        <div class="option-row"><span class="opt-label">Tratamento:</span><select class="opt-select js-opt-treatment" onchange="updateMaterials(this)"></select></div>
                        <button class="btn-lancar-os" onclick="lancarItemNaOS()">Lançar na OS <i class="fas fa-arrow-right"></i></button>
                    </div>
                `;
                container.appendChild(div);
            });
            updateFinanceSystem(); 
        }

        function handleLensClick(itemElement, design, modelName) {
            if (itemElement.classList.contains('selected') && itemElement.classList.contains('expanded')) {
                itemElement.classList.remove('expanded'); return;
            }
            if (itemElement.classList.contains('selected')) {
                itemElement.classList.add('expanded'); return;
            }
            document.querySelectorAll('.lens-item').forEach(i => { i.classList.remove('selected'); i.classList.remove('expanded'); });
            itemElement.classList.add('selected');
            activeLensItem = itemElement; currentLensModel = modelName;
            const treatmentSelect = itemElement.querySelector('.js-opt-treatment');
            if (treatmentSelect.options.length === 0) {
                Object.keys(lensDatabase[modelName].tratamentos).forEach(t => {
                    const opt = document.createElement('option'); opt.value = t; opt.innerText = t; treatmentSelect.appendChild(opt);
                });
                updateMaterials(treatmentSelect);
            } else { calculateCart(); }
            updateVisualSimulator(design); 
        }

        function updateMaterials(treatmentSelect) {
            const materialSelect = treatmentSelect.closest('.lens-item').querySelector('.js-opt-material');
            if (materialSelect.options.length === 0) {
                for (let i = 0; i < treatmentSelect.options.length; i++) {
                    if (treatmentSelect.options[i].text.toLowerCase().includes('coating')) { treatmentSelect.selectedIndex = i; break; }
                }
            }
            materialSelect.innerHTML = "";
            const materiais = lensDatabase[currentLensModel].tratamentos[treatmentSelect.value];
            Object.keys(materiais).forEach(m => {
                const opt = document.createElement('option'); opt.value = materiais[m]; opt.innerText = m; opt.setAttribute('data-name', m); materialSelect.appendChild(opt);
            });
            calculateCart();
        }

        function calculateCart() {
            if(!activeLensItem) return;
            const matSelect = activeLensItem.querySelector('.js-opt-material');
            
            const matName = matSelect.options[matSelect.selectedIndex] ? matSelect.options[matSelect.selectedIndex].getAttribute('data-name') : '';
            const treatSelect = activeLensItem.querySelector('.js-opt-treatment');
            const treatName = treatSelect.value !== "Nenhum" ? treatSelect.value : "";
            
            const total = parseFloat(matSelect.value) + parseFloat(activeLensItem.querySelector('.js-opt-surface').value);
            activeLensItem.setAttribute('data-baseprice', total);
            
            document.getElementById('cart-name').innerText = `${currentLensModel} Digital ${matName} ${treatName}`;
            updateFinanceSystem();
        }

        function toggleValorPopup() { document.getElementById('valor-popup').classList.toggle('show'); document.getElementById('calc-popup').classList.remove('show'); }
        function toggleCalcPopup() { document.getElementById('calc-popup').classList.toggle('show'); document.getElementById('valor-popup').classList.remove('show'); }

        /* NOVA LÓGICA DE MOSTRAR PREÇOS VISTA / PRAZO / OCULTO */
        function formatPriceStr(totalBruto, isCart = false) {
            const mode = document.querySelector('input[name="price-mode"]:checked').value;
            
            if (mode === 'oculto') return "---"; 
            
            if (mode === 'avista') {
                return totalBruto.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
            }
            
            const parcelas = parseInt(document.getElementById('installment-select').value) || 12;
            const valorParcela = totalBruto / parcelas;
            
            const formatted = valorParcela.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
            
            if (isCart) return formatted;
            return (parcelas === 1 ? "" : parcelas + "x ") + formatted;
        }

        function updateFinanceSystem() {
            document.querySelectorAll('.lens-item').forEach(item => {
                item.querySelector('.lens-price').innerText = formatPriceStr(parseFloat(item.getAttribute('data-baseprice')));
            });
            const finalPrice = activeLensItem ? parseFloat(activeLensItem.getAttribute('data-baseprice')) : 0;
            document.getElementById('cart-price').innerText = formatPriceStr(finalPrice, true);
        }

        function updateVisualSimulator(lvl) {
            const yTop = -50; 
            const yFunnelStart = 350; 
            const yCP2 = -50; 
            const yBottom = 750; 
            const topClearArea = "L 1200 -200 L -200 -200 Z";

            const configs = {
                'lvl1': { 
                    l: `M -100 ${yTop} L -100 ${yFunnelStart} C 200 ${yFunnelStart} 400 ${yCP2} 400 ${yBottom}`, 
                    r: `M 1050 ${yTop} L 1050 ${yFunnelStart} C 800 ${yFunnelStart} 550 ${yCP2} 550 ${yBottom}`, 
                    cr: `L 550 ${yBottom} C 550 ${yCP2} 800 ${yFunnelStart} 1050 ${yFunnelStart} L 1050 ${yTop}` 
                },
                'lvl2': { 
                    l: `M -50 ${yTop} L -50 ${yFunnelStart} C 200 ${yFunnelStart} 350 ${yCP2} 350 ${yBottom}`,

        let camStream = null;
        async function toggleCamera() {
            const btn = document.getElementById('btn-cam');
            if (!camStream) {
                try {
                    camStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                    document.getElementById('video-blurred-bg').srcObject = document.getElementById('video-sharp').srcObject = camStream;
                    document.getElementById('img-blurred-bg').style.display = document.getElementById('img-sharp').style.display = 'none';
                    document.getElementById('video-blurred-bg').style.display = document.getElementById('fo-video').style.display = 'block';
                    btn.innerHTML = '<i class="fas fa-video-slash"></i><br><br>Parar'; btn.style.background = '#dc3545';
                } catch (err) { alert("Erro na câmera."); }
            } else {
                camStream.getTracks().forEach(t => t.stop()); camStream = null;
                document.getElementById('img-blurred-bg').style.display = document.getElementById('img-sharp').style.display = 'block';
                document.getElementById('video-blurred-bg').style.display = document.getElementById('fo-video').style.display = 'none';
                btn.innerHTML = '<i class="fas fa-video"></i><br><br>Câmera'; btn.style.background = 'transparent';
            }
        }

        let calcStr = "0";
        function calcInput(v) { if (calcStr === "0") calcStr = v; else calcStr += v; document.getElementById('calc-display').value = calcStr; }
        function calcClear() { calcStr = "0"; document.getElementById('calc-display').value = calcStr; }
        function calcEval() { try { calcStr = String(eval(calcStr)); document.getElementById('calc-display').value = calcStr; } catch(e) { calcStr = "0"; } }

        function lancarItemNaOS() {
            if (!activeLensItem) {
                alert("Selecione uma lente primeiro.");
                return;
            }

            const nomeLente = document.getElementById('cart-name').innerText;
            const valorLente = parseFloat(activeLensItem.getAttribute('data-baseprice'));
            const codigoLente = "LENTE-" + Date.now().toString().slice(-4);

            const lenteEscolhida = {
                codigo: codigoLente,
                nome: nomeLente,
                valor: valorLente
            };

            localStorage.setItem('lente_ammo_pendente', JSON.stringify(lenteEscolhida));
            window.location.href = 'cadastronovo.html'; 
        }

        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const marcaSelecionadaViaUrl = urlParams.get('marca');

            if (marcaSelecionadaViaUrl) {
                const nomeExibicao = marcaSelecionadaViaUrl.toUpperCase();
                filtrarMarca(marcaSelecionadaViaUrl, nomeExibicao);
            }
            
            loadDataFromSheets();
        };
